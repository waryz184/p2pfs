# =============================================================================
# docker-compose.tailscale.yml — p2pfs accessible UNIQUEMENT via Tailscale.
# Aucun port public ouvert : tailscale (déjà installé sur l'hôte) termine le
# TLS avec son certificat *.ts.net et fait office de reverse-proxy.
#
#   docker compose -f docker-compose.tailscale.yml up -d --build
#
#   # une fois : sur l'hôte (SSH), pas dans un conteneur.
#   # nécessite MagicDNS + "HTTPS Certificates" activés sur le tailnet
#   # (https://login.tailscale.com/admin/dns).
#   sudo tailscale serve https / http://127.0.0.1:8000
#   tailscale serve status   # vérifie ; l'URL affichée est ton vault
#
# p2pfs n'est publié que sur la loopback de l'hôte (127.0.0.1:8000), jamais
# sur 0.0.0.0 : seul tailscale (sur l'hôte) peut l'atteindre. Le trafic
# host->conteneur via le port publié Docker apparaît côté conteneur comme
# venant de la gateway du réseau bridge (ici 172.29.0.1, fixée ci-dessous) :
# c'est la seule IP déclarée en -trusted-proxies (F2, fail-closed sinon).
# =============================================================================

services:
  p2pfs:
    build: .
    container_name: p2pfs
    restart: unless-stopped
    command: ["-trusted-proxies", "172.29.0.1/32"]
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - p2pfs_data:/data
    networks:
      p2pfs_net: {}

networks:
  p2pfs_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/24
          gateway: 172.29.0.1

volumes:
  p2pfs_data:
